<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مشروع ملتقى الهوايات - الفضاء</title>
    <style>
        /* إعدادات الفضاء والظلام */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            background: #050505; /* أسود عميق */
            color: white;
            overflow-x: hidden;
        }

        /* حاوية النجوم والشهب */
        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* إضافة القمر (البدر) */
        .moon {
            position: fixed;
            top: 50px;
            right: 50px;
            width: 120px;
            height: 120px;
            background: url('https://upload.wikimedia.org/wikipedia/commons/e/e1/FullMoon2010.jpg');
            background-size: cover;
            border-radius: 50%;
            z-index: 2;
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.2);
            opacity: 0.8;
        }

        /* تنسيق المحتوى فوق الفضاء */
        .content-wrapper {
            position: relative;
            z-index: 3;
        }

        header { 
            background: rgba(0, 0, 0, 0.5); 
            padding: 40px; 
            text-align: center; 
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* التصميم الزجاجي للبطاقات (Glassmorphism) */
        .card, .input-section { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            margin: 15px;
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(230, 126, 34, 0.5);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .gallery { display: flex; flex-wrap: wrap; justify-content: center; padding: 20px; }
        
        h1, h2, h3 { color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.3); }
        p { color: #ccc; }

        button {
            padding: 12px 25px;
            background: linear-gradient(45deg, #e67e22, #d35400);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover { scale: 1.05; box-shadow: 0 0 15px #e67e22; }

        input {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 10px;
            border-radius: 8px;
            margin: 5px;
        }
    </style>
</head>
<body>

    <div id="particles-js"></div>
    <div class="moon"></div>

    <div class="content-wrapper">
        <header>
            <h1>مساحة هواياتنا المشتركة 🎨</h1>
            <p>مشروع الويب المطور - نظام الفضاء التفاعلي</p>
        </header>

        <div class="input-section" style="max-width: 600px; margin: 30px auto; text-align: center;">
            <h3>أضف بصمتك الخاصة ✨</h3>
            <input type="text" id="hobbyTitle" placeholder="اسم الهواية">
            <input type="text" id="hobbyDesc" placeholder="وصف سريع...">
            <button onclick="addNewHobby()">نشر الآن</button>
        </div>

        <div class="gallery">
            <div class="card" style="width: 280px;">
                <h3>البرمجة 💻</h3>
                <p>بناء الأنظمة وتطوير الواجهات الاحترافية.</p>
            </div>
            <div class="card" style="width: 280px;">
                <h3>الفلك والنجوم 🌌</h3>
                <p>استكشاف أسرار الكون من خلال هذا المشروع.</p>
            </div>
        </div>
        <footer style="text-align: center; padding: 50px; color: #666;">
            تم التطوير بروح الفريق على GitHub &copy; 2026
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script>
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 160, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": "#ffffff" },
                "shape": { "type": "circle" },
                "opacity": { "value": 1, "random": true },
                "size": { "value": 3, "random": true },
                "line_linked": { "enable": false },
                "move": {
                    "enable": true,
                    "speed": 5, /* سرعة الشهب */
                    "direction": "bottom-right",
                    "random": true,
                    "straight": false,
                    "out_mode": "out"
                }
            },
            "interactivity": {
                "events": { "onhover": { "enable": true, "mode": "bubble" } }
            },
            "retina_detect": true
        });

        function addNewHobby() {
            let title = document.getElementById('hobbyTitle').value;
            let desc = document.getElementById('hobbyDesc').value;
            if (title && desc) {
                let card = document.createElement('div');
                card.className = 'card';
                card.style.width = '280px';
                card.innerHTML = <h3>${title}</h3><p>${desc}</p>;
                document.querySelector('.gallery').appendChild(card);
                document.getElementById('hobbyTitle').value = "";
                document.getElementById('hobbyDesc').value = "";
            }
        }
    </script>
</body>
</html>
